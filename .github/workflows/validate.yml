name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  xml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install xmllint
        run: sudo apt-get update -q && sudo apt-get install -y -q libxml2-utils
      - name: Validate XML decoders
        run: |
          for d in decoders rules; do
            [ -d "$d" ] && for f in "$d"/*.xml; do
              [ -f "$f" ] && xmllint --noout "$f" && echo "✓ $f" || exit 1
            done
          done
