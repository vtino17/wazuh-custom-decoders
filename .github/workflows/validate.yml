name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  xml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate XML decoders
        run: |
          for f in decoders/*.xml rules/*.xml; do
            xmllint --noout "$f" && echo "✓ $f" || exit 1
          done
